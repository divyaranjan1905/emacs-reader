name: CI for emacs-reader

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: true
    - name: Install dependencies
      run: |
        brew update &&
        brew install gcc make mupdf
    - name: make
      run: make all
